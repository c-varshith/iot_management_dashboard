name: Build and Package Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: "17"

jobs:
  # ============================================================
  # LINUX — fat JAR + jlink runtime + run.sh → zip
  # ============================================================
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK with JavaFX (Liberica Full)
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: ${{ env.JAVA_VERSION }}
          java-package: jdk+fx

      - name: Build fat JAR
        run: mvn -B clean package -DskipTests

      - name: Show target directory contents
        run: ls -lh target/*.jar

      - name: Package Linux zip
        run: |
          # maven-shade-plugin (without shadedArtifactAttached) replaces the
          # original JAR in-place — output is iot-dashboard-X.Y.Z.jar, NOT *-shaded.jar
          JAR_PATH=$(find target -maxdepth 1 -name '*.jar' ! -name 'original-*' | head -n1)
          if [ -z "$JAR_PATH" ]; then
            echo "ERROR: no fat jar found in target/"; ls -lh target/; exit 1
          fi
          JAR_NAME=$(basename "$JAR_PATH")
          echo "Using JAR: $JAR_PATH"

          PACKAGE_DIR=dist/iot-dashboard-linux
          mkdir -p "$PACKAGE_DIR"

          # Bundle a minimal JRE including JavaFX modules
          # Liberica Full JDK provides the javafx.* jmods; Temurin does NOT
          jlink \
            --module-path "${JAVA_HOME}/jmods" \
            --add-modules java.se,javafx.controls,javafx.fxml,javafx.graphics,javafx.base,jdk.unsupported \
            --output "$PACKAGE_DIR/runtime" \
            --strip-debug \
            --no-header-files \
            --no-man-pages \
            --compress=2

          cp "$JAR_PATH" "$PACKAGE_DIR/$JAR_NAME"

          # Write launcher without heredoc (<<EOF breaks YAML parsers)
          {
            echo '#!/usr/bin/env sh'
            echo 'DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"'
            echo 'exec "$DIR/runtime/bin/java" \'
            echo '  --module-path "$DIR/runtime/lib" \'
            echo '  --add-modules javafx.controls,javafx.fxml \'
            echo '  --add-opens javafx.graphics/com.sun.javafx.application=ALL-UNNAMED \'
            printf '  -jar "$DIR/%s" "$@"\n' "$JAR_NAME"
          } > "$PACKAGE_DIR/run.sh"
          chmod +x "$PACKAGE_DIR/run.sh"

          cp database.properties.example "$PACKAGE_DIR/database.properties.example"

          (cd dist && zip -r iot-dashboard-linux.zip iot-dashboard-linux)
          echo "Linux zip created: $(du -sh dist/iot-dashboard-linux.zip)"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: dist/iot-dashboard-linux.zip
          if-no-files-found: error

  # ============================================================
  # WINDOWS — fat JAR + jpackage installer → .exe
  # ============================================================
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK with JavaFX (Liberica Full)
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: ${{ env.JAVA_VERSION }}
          java-package: jdk+fx

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset -y --no-progress

      - name: Build fat JAR
        run: mvn -B clean package -DskipTests

      - name: Show target directory contents
        shell: pwsh
        run: Get-ChildItem target -Filter *.jar | Select-Object Name, Length

      - name: Package Windows exe
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')

          # maven-shade-plugin replaces the original JAR in-place — no *-shaded.jar
          $jarFile = Get-ChildItem target -Filter *.jar |
                     Where-Object { $_.Name -notlike 'original-*' } |
                     Select-Object -First 1
          if (-not $jarFile) {
            Write-Host "ERROR: no fat jar found. Contents of target/:"
            Get-ChildItem target
            throw "Fat jar not found in target directory."
          }
          Write-Host "Using JAR: $($jarFile.FullName)"

          # jpackage needs a clean input dir with only the fat JAR
          New-Item -ItemType Directory -Force -Path dist\input | Out-Null
          Copy-Item $jarFile.FullName dist\input\
          New-Item -ItemType Directory -Force -Path dist\output | Out-Null

          # jpackage bundles the full Liberica runtime (with JavaFX) automatically
          & jpackage `
            --input            dist\input `
            --name             iot-dashboard `
            --main-jar         $jarFile.Name `
            --type             exe `
            --app-version      $version `
            --dest             dist\output `
            --java-options     '--add-opens javafx.graphics/com.sun.javafx.application=ALL-UNNAMED'

          $exe = Get-ChildItem dist\output -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Host "ERROR: jpackage did not produce an exe. Contents of dist/output/:"
            Get-ChildItem dist\output
            throw "Windows exe was not created by jpackage."
          }

          $dest = "dist\iot-dashboard-$version.exe"
          Move-Item $exe.FullName $dest -Force
          Write-Host "Windows exe created: $dest"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: dist/iot-dashboard-*.exe
          if-no-files-found: error

  # ============================================================
  # RELEASE — attach both artifacts to a GitHub Release
  # ============================================================
  release:
    needs: [linux, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-package
          path: release-assets/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: release-assets/windows

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | Windows  | `iot-dashboard-*.exe` | Installer — bundled Java runtime, no install needed |
            | Linux    | `iot-dashboard-linux.zip` | Extract and run `./run.sh` |

            ### First-Time Setup
            1. **Database** — Open Settings inside the app and enter your MySQL credentials, or copy `database.properties.example` to `~/.iot-dashboard/config.properties` and fill in the values.
            2. **Sensor mode** — Defaults to Simulation. Open Settings to switch to Real Sensor and select DHT11 or DHT22.

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup instructions.
          fail_on_unmatched_files: true
          files: |
            release-assets/linux/*.zip
            release-assets/windows/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
