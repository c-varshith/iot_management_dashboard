name: Build and Package Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  JAVAFX_VERSION: '17.0.6'

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build
        run: mvn -B clean package -DskipTests

      - name: Download JavaFX SDK
        run: |
          mvn -q org.apache.maven.plugins:maven-dependency-plugin:3.6.1:copy \
            -Dartifact=org.openjfx:javafx-sdk:${{ env.JAVAFX_VERSION }}:linux-x64 \
            -DoutputDirectory=javafx
          unzip -q javafx/javafx-sdk-*.zip -d javafx

      - name: Package app image
        run: |
          JAR_NAME=$(ls target/*.jar | xargs -n1 basename | grep 'iot-dashboard' | head -n1)
          JAVAFX_LIB=$(echo javafx/javafx-sdk-*/lib)
          mkdir -p dist
          jpackage \
            --input target \
            --name iot-dashboard \
            --main-jar "$JAR_NAME" \
            --type app-image \
            --dest dist \
            --module-path "$JAVAFX_LIB" \
            --add-modules javafx.controls,javafx.fxml

      - name: Zip Linux app image
        run: |
          APP_DIR=$(find dist -maxdepth 1 -type d -name 'iot-dashboard*' | head -n1)
          zip -r dist/iot-dashboard-linux.zip "$APP_DIR"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: iot-dashboard-linux
          path: dist/iot-dashboard-linux.zip

      - name: Upload Linux release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/iot-dashboard-linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build
        run: mvn -B clean package -DskipTests

      - name: Download JavaFX SDK
        shell: pwsh
        run: |
          mvn -q org.apache.maven.plugins:maven-dependency-plugin:3.6.1:copy `
            -Dartifact=org.openjfx:javafx-sdk:${env:JAVAFX_VERSION}:windows-x64 `
            -DoutputDirectory=javafx
          Expand-Archive -Path (Get-ChildItem javafx\javafx-sdk-*.zip | Select-Object -First 1) -DestinationPath javafx -Force

      - name: Package exe
        shell: pwsh
        run: |
          $jar = (Get-ChildItem target\*.jar | Where-Object { $_.Name -like 'iot-dashboard*' } | Select-Object -First 1).Name
          $javafx = (Get-ChildItem javafx | Where-Object { $_.Name -like 'javafx-sdk-*' } | Select-Object -First 1).FullName
          $lib = Join-Path $javafx 'lib'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          jpackage `
            --input target `
            --name iot-dashboard `
            --main-jar $jar `
            --type exe `
            --dest dist `
            --module-path $lib `
            --add-modules javafx.controls,javafx.fxml

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: iot-dashboard-windows
          path: dist/*.exe

      - name: Upload Windows release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
