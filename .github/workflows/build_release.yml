name: Build and Package Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  JAVAFX_VERSION: '17.0.19'

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build
        run: mvn -B clean package -DskipTests

      - name: Download JavaFX SDK
        run: |
          mkdir -p javafx
          curl -fsSL \
            -o javafx/javafx-sdk.zip \
            https://download2.gluonhq.com/openjfx/${{ env.JAVAFX_VERSION }}/openjfx-${{ env.JAVAFX_VERSION }}_linux-x64_bin-sdk.zip
          unzip -q javafx/javafx-sdk.zip -d javafx
          rm javafx/javafx-sdk.zip

      - name: Package app image
        run: |
          JAR_NAME=$(find target -maxdepth 1 -name '*-shaded.jar' -printf '%f\n' | head -n1)
          JAVAFX_LIB=$(find javafx -type d -path '*/lib' | head -n1)
          mkdir -p dist
          jpackage \
            --input target \
            --name iot-dashboard \
            --main-jar "$JAR_NAME" \
            --type app-image \
            --dest dist \
            --module-path "$JAVAFX_LIB" \
            --add-modules javafx.controls,javafx.fxml

      - name: Zip Linux app image
        run: |
          APP_DIR=$(find dist -maxdepth 1 -type d -name 'iot-dashboard*' | head -n1)
          zip -r dist/iot-dashboard-linux.zip "$APP_DIR"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: iot-dashboard-linux
          path: dist/iot-dashboard-linux.zip

      - name: Upload Linux release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/iot-dashboard-linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build
        run: mvn -B clean package -DskipTests

      - name: Download JavaFX SDK
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path javafx\lib | Out-Null
          $baseUrl = "https://repo1.maven.org/maven2/org/openjfx"
          $downloads = @(
            @{ Name = "javafx-base"; File = "javafx-base-$env:JAVAFX_VERSION-win.jar" },
            @{ Name = "javafx-graphics"; File = "javafx-graphics-$env:JAVAFX_VERSION-win.jar" },
            @{ Name = "javafx-controls"; File = "javafx-controls-$env:JAVAFX_VERSION-win.jar" },
            @{ Name = "javafx-fxml"; File = "javafx-fxml-$env:JAVAFX_VERSION-win.jar" }
          )

          foreach ($item in $downloads) {
            $url = "$baseUrl/$($item.Name)/$env:JAVAFX_VERSION/$($item.File)"
            Invoke-WebRequest -Uri $url -OutFile (Join-Path javafx\lib $item.File)
          }

      - name: Package app image
        shell: pwsh
        run: |
          $jar = (Get-ChildItem target\*-shaded.jar | Select-Object -First 1).Name
          $javafxLib = (Get-ChildItem javafx -Recurse -Directory | Where-Object { $_.Name -eq 'lib' } | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $jpackageArgs = @(
            '--input', 'target',
            '--name', 'iot-dashboard',
            '--main-jar', $jar,
            '--type', 'app-image',
            '--dest', 'dist',
            '--module-path', $javafxLib,
            '--add-modules', 'javafx.controls,javafx.fxml'
          )
          & jpackage @jpackageArgs

      - name: Zip Windows app image
        shell: pwsh
        run: |
          $appDir = Get-ChildItem dist | Where-Object { $_.PSIsContainer -and $_.Name -like 'iot-dashboard*' } | Select-Object -First 1
          if (-not $appDir) { throw "Windows app image directory not found in dist." }
          Compress-Archive -Path $appDir.FullName -DestinationPath dist\iot-dashboard-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: iot-dashboard-windows
          path: dist/iot-dashboard-windows.zip

      - name: Upload Windows release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/iot-dashboard-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
