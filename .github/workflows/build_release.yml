name: Build and Package Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build
        run: mvn -B clean package -DskipTests

      - name: Package portable bundle
        run: |
          JAR_PATH=$(find target -maxdepth 1 -name '*-shaded.jar' | head -n1)
          JAR_NAME=$(basename "$JAR_PATH")
          PACKAGE_DIR=dist/iot-dashboard-linux
          mkdir -p "$PACKAGE_DIR"
          jlink \
            --add-modules java.se \
            --output "$PACKAGE_DIR/runtime" \
            --strip-debug \
            --no-header-files \
            --no-man-pages \
            --compress=2
          cp "$JAR_PATH" "$PACKAGE_DIR/$JAR_NAME"
          cat > "$PACKAGE_DIR/run.sh" <<EOF
#!/usr/bin/env sh
DIR="\$(CDPATH= cd -- "\$(dirname -- "\$0")" && pwd)"
exec "\$DIR/runtime/bin/java" -jar "\$DIR/$JAR_NAME" "\$@"
EOF
          chmod +x "$PACKAGE_DIR/run.sh"

      - name: Zip Linux app image
        run: |
          (cd dist && zip -r iot-dashboard-linux.zip iot-dashboard-linux)

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: iot-dashboard-linux
          path: dist/iot-dashboard-linux.zip

      - name: Upload Linux release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/iot-dashboard-linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build
        run: mvn -B clean package -DskipTests

      - name: Package portable bundle
        shell: pwsh
        run: |
          $jarPath = Get-ChildItem target -Filter *-shaded.jar | Select-Object -First 1
          if (-not $jarPath) {
            throw "Shaded jar not found in target directory."
          }

          $packageDir = "dist\iot-dashboard-windows"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          jlink `
            --add-modules java.se `
            --output "$packageDir\runtime" `
            --strip-debug `
            --no-header-files `
            --no-man-pages `
            --compress=2

          Copy-Item $jarPath.FullName "$packageDir\$($jarPath.Name)"

          $runBat = @"
@echo off
setlocal
set "DIR=%~dp0"
"%DIR%runtime\bin\java.exe" -jar "%DIR%$($jarPath.Name)" %*
"@

          $runBat | Set-Content -Encoding Ascii "$packageDir\run.bat"

      - name: Zip Windows app image
        shell: pwsh
        run: |
          $appDir = Get-ChildItem dist | Where-Object { $_.PSIsContainer -and $_.Name -eq 'iot-dashboard-windows' } | Select-Object -First 1
          if (-not $appDir) { throw "Windows app image directory not found in dist." }
          Compress-Archive -Path $appDir.FullName -DestinationPath dist\iot-dashboard-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: iot-dashboard-windows
          path: dist/iot-dashboard-windows.zip

      - name: Upload Windows release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/iot-dashboard-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
