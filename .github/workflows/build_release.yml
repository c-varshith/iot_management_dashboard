name: Build and Package Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: "17"

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build
        run: mvn -B clean package -DskipTests

      - name: Package Linux zip
        run: |
          JAR_PATH=$(find target -maxdepth 1 -name '*-shaded.jar' | head -n1)
          JAR_NAME=$(basename "$JAR_PATH")
          PACKAGE_DIR=dist/iot-dashboard-linux
          mkdir -p "$PACKAGE_DIR"
          jlink \
            --add-modules java.se \
            --output "$PACKAGE_DIR/runtime" \
            --strip-debug \
            --no-header-files \
            --no-man-pages \
            --compress=2
          cp "$JAR_PATH" "$PACKAGE_DIR/$JAR_NAME"
          cat > "$PACKAGE_DIR/run.sh" <<EOF
#!/usr/bin/env sh
DIR="\$(CDPATH= cd -- "\$(dirname -- "\$0")" && pwd)"
exec "\$DIR/runtime/bin/java" -jar "\$DIR/$JAR_NAME" "\$@"
EOF
          chmod +x "$PACKAGE_DIR/run.sh"
          (cd dist && zip -r iot-dashboard-linux.zip iot-dashboard-linux)

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: dist/iot-dashboard-linux.zip
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset -y --no-progress

      - name: Build
        run: mvn -B clean package -DskipTests

      - name: Package Windows exe
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $jarPath = Get-ChildItem target -Filter *-shaded.jar | Select-Object -First 1
          if (-not $jarPath) {
            throw "Shaded jar not found in target directory."
          }

          $candle = Get-ChildItem "C:\Program Files (x86)","C:\Program Files" -Recurse -Filter candle.exe |
            Select-Object -First 1
          if (-not $candle) {
            throw "WiX Toolset binaries not found after installation."
          }
          $wixBin = Split-Path $candle.FullName
          $env:PATH = "$wixBin;$env:PATH"

          New-Item -ItemType Directory -Force -Path dist\raw | Out-Null
          $jpackageArgs = @(
            '--input', 'target',
            '--name', 'iot-dashboard',
            '--main-jar', $jarPath.Name,
            '--type', 'exe',
            '--dest', 'dist\raw'
          )
          & jpackage @jpackageArgs

          $exe = Get-ChildItem dist\raw -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            throw "Windows exe was not created."
          }

          Move-Item $exe.FullName "dist\iot-dashboard-$version.exe" -Force
          Remove-Item dist\raw -Recurse -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: dist/*.exe
          if-no-files-found: error

  release:
    needs:
      - linux
      - windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-package
          path: release-assets/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: release-assets/windows

      - name: Verify release assets
        run: |
          find release-assets -maxdepth 3 -type f | sort

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            release-assets/linux/*.zip
            release-assets/windows/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
